spring.application.name=tenzen-ca

# Escuta apenas local por default; mude para 0.0.0.0 (e ligue o basic-auth) para expor.
server.address=127.0.0.1
server.port=8080

# URL base embutida nos certificados (CRL DP, AIA, CPS). Deve ser alcancavel pelos clientes.
app.base-url=http://localhost:8080
app.data-dir=${user.home}/.tenzen-ca

# Senha dos keystores da AC (root.p12 / issuing.p12). Default apenas para conveniencia local.
app.ca.keystore-password=${APP_CA_KEYSTORE_PASSWORD:tenzen-dev}
# icp-format: policy OID no formato ICP-Brasil com leaf ficticio (documentado como nao atribuido)
# private-2.25: OID privado derivado de UUID
app.ca.policy-mode=icp-format

app.security.basic-auth.enabled=false
app.security.basic-auth.username=tenzen
app.security.basic-auth.password=

# Historico (H2 em arquivo no data-dir)
spring.datasource.url=jdbc:h2:file:${app.data-dir}/tenzenca
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Upload de CSR (texto pequeno)
spring.servlet.multipart.max-file-size=64KB
spring.servlet.multipart.max-request-size=128KB

logging.level.org.hibernate=warn
