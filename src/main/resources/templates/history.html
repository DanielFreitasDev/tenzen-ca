<!DOCTYPE html>
<html lang="pt-BR" th:replace="~{layout/base :: page('Histórico', ~{:: section})}"
      xmlns:th="http://www.thymeleaf.org">
<body>
<section>
    <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4">
        <div>
            <h1 class="text-2xl font-bold tracking-tight">Histórico</h1>
            <p class="mt-1 text-muted-foreground text-sm">
                Tudo que esta AC de teste já emitiu. Revogar publica a CRL na hora.
            </p>
        </div>
        <form class="flex gap-2" method="get" role="search" th:action="@{/historico}">
            <label class="sr-only" for="q">Buscar por titular, documento ou serial</label>
            <input class="input w-64" id="q" name="q" placeholder="titular, documento ou serial"
                   th:value="${query}">
            <button class="btn btn-outline shrink-0" type="submit">Buscar</button>
        </form>
    </div>

    <div class="card p-10 mt-6 text-center" th:if="${certificates.isEmpty()}">
        <p class="text-muted-foreground">
            <span th:if="${query.isBlank()}">Nada emitido ainda.</span>
            <span th:unless="${query.isBlank()}">Nada encontrado para essa busca.</span>
        </p>
        <a class="btn btn-primary mt-4" th:href="@{/emitir}">Emitir o primeiro</a>
    </div>

    <div class="card mt-6 overflow-x-auto" th:unless="${certificates.isEmpty()}">
        <table class="w-full text-sm min-w-175">
            <thead>
            <tr class="border-b border-border text-left text-xs text-muted-foreground">
                <th class="font-medium px-4 py-3">Titular</th>
                <th class="font-medium px-4 py-3">Perfil</th>
                <th class="font-medium px-4 py-3">Validade</th>
                <th class="font-medium px-4 py-3">Status</th>
                <th class="font-medium px-4 py-3 text-right">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr class="border-b border-border last:border-0 align-top" th:each="c : ${certificates}">
                <td class="px-4 py-3">
                    <a class="font-medium hover:text-primary"
                       th:href="@{|/certificados/${c.id}|}" th:text="${c.subjectCn}">TITULAR</a>
                    <p class="technical text-xs text-muted-foreground mt-0.5"
                       th:text="${c.document}">000</p>
                </td>
                <td class="px-4 py-3">
                    <span th:text="${profileLabels[c.profileId]}">RFB e-CPF A1</span>
                    <p class="mt-0.5" th:if="${c.labMode}"><span class="badge badge-warning">laboratório</span></p>
                    <p class="mt-0.5" th:if="${c.source.name() == 'CSR'}"><span class="badge badge-muted">CSR</span></p>
                </td>
                <td class="px-4 py-3 technical text-xs whitespace-nowrap">
                    <span th:text="${@fmt.date(c.notBefore)}">01/01</span><br>
                    <span th:text="${@fmt.date(c.notAfter)}">01/01</span>
                </td>
                <td class="px-4 py-3">
                    <span class="badge badge-success" th:if="${c.status.name() == 'VALID'}">válido</span>
                    <span class="badge badge-destructive" th:if="${c.status.name() == 'REVOKED'}">revogado</span>
                </td>
                <td class="px-4 py-3">
                    <div class="flex items-center justify-end gap-1.5 flex-wrap">
                        <a class="btn btn-outline h-8 text-xs"
                           th:href="@{|/certificados/${c.id}/certificado.p12|}"
                           th:if="${c.hasPrivateKey()}">.p12</a>
                        <a class="btn btn-outline h-8 text-xs"
                           th:href="@{|/certificados/${c.id}/certificado.pem|}">PEM</a>
                        <details class="relative" th:if="${c.status.name() == 'VALID'}">
                            <summary class="btn btn-ghost h-8 text-xs text-destructive list-none cursor-pointer">
                                Revogar
                            </summary>
                            <form class="absolute right-0 z-10 mt-1 w-64 card p-3 shadow-lg space-y-2 text-left"
                                  method="post"
                                  th:action="@{|/certificados/${c.id}/revogar|}">
                                <label class="field-label" th:for="|motivo-${c.id}|">Motivo</label>
                                <select class="input h-9" name="motivo" th:id="|motivo-${c.id}|">
                                    <option value="unspecified">não especificado</option>
                                    <option value="keyCompromise">comprometimento de chave</option>
                                    <option value="affiliationChanged">mudança de vínculo</option>
                                    <option value="superseded">substituído</option>
                                    <option value="cessationOfOperation">encerramento de uso</option>
                                </select>
                                <button class="btn btn-destructive h-9 w-full" type="submit">
                                    Confirmar revogação
                                </button>
                            </form>
                        </details>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
