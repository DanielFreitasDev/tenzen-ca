<!DOCTYPE html>
<html lang="pt-BR" th:fragment="page(title, content)"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title th:text="${title} + ' · Tenzen CA'">Tenzen CA</title>
    <!-- anti-FOUC: aplica o tema salvo antes do primeiro paint -->
    <script th:attr="nonce=${cspNonce}">
        (function () {
            var t = localStorage.getItem('tenzen-theme');
            if (t !== 'light' && t !== 'dark') {
                t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.classList.toggle('dark', t === 'dark');
        })();
    </script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="icon" th:href="@{/img/favicon.svg}" type="image/svg+xml">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body class="min-h-dvh flex flex-col">
<div aria-hidden="true" class="guilloche-bg"></div>

<header class="border-b border-border bg-card/80 backdrop-blur-sm sticky top-0 z-20">
    <div class="mx-auto max-w-5xl px-4 sm:px-6 h-14 flex items-center justify-between gap-4">
        <a class="flex items-center gap-2.5 font-semibold text-foreground" th:href="@{/}">
            <svg aria-hidden="true" class="size-6 text-primary" fill="none" stroke="currentColor"
                 stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" viewBox="0 0 24 24">
                <path d="M12 2.5 4.5 5.6v5.3c0 4.6 3.2 8.9 7.5 10.6 4.3-1.7 7.5-6 7.5-10.6V5.6L12 2.5Z"/>
                <path d="M8.8 12.1l2.2 2.2 4.2-4.4"/>
            </svg>
            <span>Tenzen CA</span>
            <span class="badge badge-warning hidden sm:inline-flex">ambiente de testes</span>
        </a>
        <nav aria-label="Navegação principal" class="flex items-center gap-0.5 sm:gap-1 text-sm">
            <a class="btn btn-ghost h-9 px-2.5 sm:px-3" th:href="@{/emitir}">Emitir</a>
            <a class="btn btn-ghost h-9 px-2.5 sm:px-3" th:href="@{/csr}">CSR</a>
            <a class="btn btn-ghost h-9 px-2.5 sm:px-3" th:href="@{/historico}">Histórico</a>
            <a class="btn btn-ghost h-9 px-2.5 sm:px-3" th:href="@{/cadeia}">Cadeia</a>
            <button aria-label="Alternar tema claro/escuro" class="btn btn-ghost h-9 w-9 px-0 ml-1"
                    data-theme-toggle
                    type="button">
                <!-- sol (mostrado no escuro) / lua (no claro), troca via CSS -->
                <svg aria-hidden="true" class="size-4.5 hidden dark:block" fill="none" stroke="currentColor"
                     stroke-linecap="round" stroke-width="1.7" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="4.2"/>
                    <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6 17 7M7 17l-1.4 1.4"/>
                </svg>
                <svg aria-hidden="true" class="size-4.5 dark:hidden" fill="none" stroke="currentColor"
                     stroke-linecap="round" stroke-linejoin="round" stroke-width="1.7" viewBox="0 0 24 24">
                    <path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5a8.5 8.5 0 1 0 11 11Z"/>
                </svg>
            </button>
        </nav>
    </div>
</header>

<main class="flex-1 mx-auto w-full max-w-5xl px-4 sm:px-6 py-8">
    <th:block th:replace="${content}"/>
</main>

<footer class="border-t border-border mt-8">
    <div class="mx-auto max-w-5xl px-4 sm:px-6 py-5 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-2 text-xs text-muted-foreground">
        <p>
            Tenzen CA emite certificados <strong class="font-medium">exclusivamente para teste</strong>.
            A cadeia é fictícia e não tem valor legal.
        </p>
        <p class="flex items-center gap-3 shrink-0">
            <a class="hover:text-foreground underline underline-offset-2" th:href="@{/dpc}">DPC de teste</a>
            <a class="hover:text-foreground underline underline-offset-2" th:href="@{/cadeia}">AC-Raiz</a>
        </p>
    </div>
</footer>
</body>
</html>
